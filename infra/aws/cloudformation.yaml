AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Dedicated low-cost AWS infrastructure for toss-portfolio-lens: EKS, ECR,
  private RDS MariaDB, private S3 report storage, and least-privilege Pod Identity roles.

Parameters:
  ClusterName:
    Type: String
    Default: toss-portfolio-lens
    AllowedPattern: "^[A-Za-z0-9][A-Za-z0-9_-]{0,99}$"
  KubernetesVersion:
    Type: String
    Default: ""
    Description: Leave empty to use the current EKS default version.
  ClusterPublicAccessCidr:
    Type: String
    Description: IPv4 CIDR allowed to reach the public EKS API endpoint.
    AllowedPattern: "^(?:[0-9]{1,3}\\.){3}[0-9]{1,3}/(?:[0-9]|[12][0-9]|3[0-2])$"
  RepositoryName:
    Type: String
    Default: toss-portfolio-lens
    AllowedPattern: "^[a-z0-9]+(?:[._/-][a-z0-9]+)*$"
  NodeInstanceType:
    Type: String
    Default: t3.small
  DatabaseInstanceClass:
    Type: String
    Default: db.t4g.small
  DatabaseEngineVersion:
    Type: String
    Default: 11.8.8
  DatabaseName:
    Type: String
    Default: portfolio_lens
    AllowedPattern: "^[A-Za-z][A-Za-z0-9_]{0,63}$"
  DatabaseUsername:
    Type: String
    Default: portfolio_admin
    AllowedPattern: "^[A-Za-z][A-Za-z0-9_]{0,15}$"
  ReportPrefix:
    Type: String
    Default: portfolio-reports
    AllowedPattern: "^[A-Za-z0-9][A-Za-z0-9!_.*'()/-]{0,127}$"
  BedrockRegion:
    Type: String
    Default: eu-north-1
    AllowedValues:
      - eu-north-1
  BedrockModelId:
    Type: String
    Default: moonshotai.kimi-k2.5
    AllowedValues:
      - moonshotai.kimi-k2.5

Conditions:
  HasKubernetesVersion: !Not [!Equals [!Ref KubernetesVersion, ""]]

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.42.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      InstanceTenancy: default
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-igw

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref Vpc

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: 10.42.0.0/20
      MapPublicIpOnLaunch: true
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-public-a
        - Key: kubernetes.io/role/elb
          Value: "1"
        - Key: !Sub kubernetes.io/cluster/${ClusterName}
          Value: shared

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: 10.42.16.0/20
      MapPublicIpOnLaunch: true
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-public-b
        - Key: kubernetes.io/role/elb
          Value: "1"
        - Key: !Sub kubernetes.io/cluster/${ClusterName}
          Value: shared

  DatabaseSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: 10.42.128.0/24
      MapPublicIpOnLaunch: false
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-database-a

  DatabaseSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: 10.42.129.0/24
      MapPublicIpOnLaunch: false
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-database-b

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-public

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetA

  PublicSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetB

  DatabaseRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-database-isolated

  DatabaseSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref DatabaseRouteTable
      SubnetId: !Ref DatabaseSubnetA

  DatabaseSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref DatabaseRouteTable
      SubnetId: !Ref DatabaseSubnetB

  ClusterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EKS control plane traffic for toss-portfolio-lens
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-cluster

  NodeSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EKS managed node and pod traffic for toss-portfolio-lens
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-nodes
        - Key: !Sub kubernetes.io/cluster/${ClusterName}
          Value: owned

  ClusterFromNodesIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: Nodes access the Kubernetes API
      GroupId: !Ref ClusterSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      SourceSecurityGroupId: !Ref NodeSecurityGroup

  NodesFromClusterIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: Control plane reaches kubelet and admission webhooks
      GroupId: !Ref NodeSecurityGroup
      IpProtocol: tcp
      FromPort: 1025
      ToPort: 65535
      SourceSecurityGroupId: !Ref ClusterSecurityGroup

  NodesSelfIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: Node-to-node and pod-to-pod traffic
      GroupId: !Ref NodeSecurityGroup
      IpProtocol: "-1"
      SourceSecurityGroupId: !Ref NodeSecurityGroup

  DatabaseSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: MariaDB access only from the EKS nodes and pods
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - Description: MariaDB from EKS node security group
          IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref NodeSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-database

  ClusterRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/AmazonEKSClusterPolicy
      Tags:
        - Key: Project
          Value: toss-portfolio-lens

  NodeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - !Sub arn:${AWS::Partition}:iam::aws:policy/AmazonEC2ContainerRegistryPullOnly
        - !Sub arn:${AWS::Partition}:iam::aws:policy/AmazonEKS_CNI_Policy
      Tags:
        - Key: Project
          Value: toss-portfolio-lens

  NodeLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              DeleteOnTermination: true
              Encrypted: true
              VolumeSize: 20
              VolumeType: gp3
        MetadataOptions:
          HttpEndpoint: enabled
          HttpPutResponseHopLimit: 1
          HttpTokens: required
        SecurityGroupIds:
          - !Ref NodeSecurityGroup
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub ${AWS::StackName}-eks-node
              - Key: Project
                Value: toss-portfolio-lens
          - ResourceType: volume
            Tags:
              - Key: Project
                Value: toss-portfolio-lens
      TagSpecifications:
        - ResourceType: launch-template
          Tags:
            - Key: Project
              Value: toss-portfolio-lens

  EksCluster:
    Type: AWS::EKS::Cluster
    DependsOn:
      - ClusterFromNodesIngress
      - NodesFromClusterIngress
    Properties:
      Name: !Ref ClusterName
      RoleArn: !GetAtt ClusterRole.Arn
      Version: !If [HasKubernetesVersion, !Ref KubernetesVersion, !Ref AWS::NoValue]
      AccessConfig:
        AuthenticationMode: API_AND_CONFIG_MAP
        BootstrapClusterCreatorAdminPermissions: true
      ResourcesVpcConfig:
        EndpointPrivateAccess: true
        EndpointPublicAccess: true
        PublicAccessCidrs:
          - !Ref ClusterPublicAccessCidr
        SecurityGroupIds:
          - !Ref ClusterSecurityGroup
        SubnetIds:
          - !Ref PublicSubnetA
          - !Ref PublicSubnetB
      Tags:
        - Key: Project
          Value: toss-portfolio-lens

  VpcCniAddon:
    Type: AWS::EKS::Addon
    Properties:
      AddonName: vpc-cni
      ClusterName: !Ref EksCluster
      ResolveConflicts: OVERWRITE

  NodeGroup:
    Type: AWS::EKS::Nodegroup
    DependsOn:
      - PublicDefaultRoute
      - VpcCniAddon
    Properties:
      AmiType: AL2023_x86_64_STANDARD
      CapacityType: ON_DEMAND
      ClusterName: !Ref EksCluster
      InstanceTypes:
        - !Ref NodeInstanceType
      Labels:
        workload: portfolio-lens
      LaunchTemplate:
        Id: !Ref NodeLaunchTemplate
        Version: !GetAtt NodeLaunchTemplate.LatestVersionNumber
      NodeRole: !GetAtt NodeRole.Arn
      ScalingConfig:
        DesiredSize: 1
        MaxSize: 1
        MinSize: 1
      Subnets:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB
      Tags:
        Project: toss-portfolio-lens
      UpdateConfig:
        MaxUnavailable: 1

  CoreDnsAddon:
    Type: AWS::EKS::Addon
    DependsOn: NodeGroup
    Properties:
      AddonName: coredns
      ClusterName: !Ref EksCluster
      ResolveConflicts: OVERWRITE

  KubeProxyAddon:
    Type: AWS::EKS::Addon
    DependsOn: NodeGroup
    Properties:
      AddonName: kube-proxy
      ClusterName: !Ref EksCluster
      ResolveConflicts: OVERWRITE

  PodIdentityAgentAddon:
    Type: AWS::EKS::Addon
    DependsOn: NodeGroup
    Properties:
      AddonName: eks-pod-identity-agent
      ClusterName: !Ref EksCluster
      ResolveConflicts: OVERWRITE

  ImageRepository:
    Type: AWS::ECR::Repository
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      EmptyOnDelete: false
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: IMMUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: >-
          {"rules":[{"rulePriority":1,"description":"Keep the 20 newest images","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":20},"action":{"type":"expire"}}]}
      RepositoryName: !Ref RepositoryName
      Tags:
        - Key: Project
          Value: toss-portfolio-lens

  ReportBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Project
          Value: toss-portfolio-lens

  ReportBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ReportBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource:
              - !GetAtt ReportBucket.Arn
              - !Sub ${ReportBucket.Arn}/*
            Condition:
              Bool:
                aws:SecureTransport: "false"

  DatabaseSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Isolated subnets for toss-portfolio-lens MariaDB
      SubnetIds:
        - !Ref DatabaseSubnetA
        - !Ref DatabaseSubnetB
      Tags:
        - Key: Project
          Value: toss-portfolio-lens

  DatabaseParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: MariaDB parameters for toss-portfolio-lens
      Family: mariadb11.8
      Parameters:
        require_secure_transport: "1"
      Tags:
        - Key: Project
          Value: toss-portfolio-lens

  Database:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      AllocatedStorage: "20"
      AutoMinorVersionUpgrade: true
      BackupRetentionPeriod: 7
      CopyTagsToSnapshot: true
      DBInstanceClass: !Ref DatabaseInstanceClass
      DBName: !Ref DatabaseName
      DBParameterGroupName: !Ref DatabaseParameterGroup
      DBSubnetGroupName: !Ref DatabaseSubnetGroup
      DeletionProtection: false
      EnableIAMDatabaseAuthentication: false
      Engine: mariadb
      EngineVersion: !Ref DatabaseEngineVersion
      ManageMasterUserPassword: true
      MasterUsername: !Ref DatabaseUsername
      MultiAZ: false
      Port: 3306
      PubliclyAccessible: false
      StorageEncrypted: true
      StorageType: gp3
      VPCSecurityGroups:
        - !Ref DatabaseSecurityGroup
      Tags:
        - Key: Project
          Value: toss-portfolio-lens

  AppPodRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession
      Policies:
        - PolicyName: ReportStorageAndBedrock
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadWriteReportObjects
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub ${ReportBucket.Arn}/${ReportPrefix}/*
              - Sid: ReadReportBucketMetadata
                Effect: Allow
                Action:
                  - s3:GetBucketLocation
                Resource: !GetAtt ReportBucket.Arn
              - Sid: InvokeKimiK25InStockholm
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: !Sub arn:${AWS::Partition}:bedrock:${BedrockRegion}::foundation-model/${BedrockModelId}
      Tags:
        - Key: Project
          Value: toss-portfolio-lens

  LoadBalancerControllerPodRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession
      Tags:
        - Key: Project
          Value: toss-portfolio-lens

  LoadBalancerControllerPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Official AWS Load Balancer Controller v2.14.1 IAM policy
      Roles:
        - !Ref LoadBalancerControllerPodRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: iam:CreateServiceLinkedRole
            Resource: "*"
            Condition:
              StringEquals:
                iam:AWSServiceName: elasticloadbalancing.amazonaws.com
          - Effect: Allow
            Action:
              - ec2:DescribeAccountAttributes
              - ec2:DescribeAddresses
              - ec2:DescribeAvailabilityZones
              - ec2:DescribeInternetGateways
              - ec2:DescribeVpcs
              - ec2:DescribeVpcPeeringConnections
              - ec2:DescribeSubnets
              - ec2:DescribeSecurityGroups
              - ec2:DescribeInstances
              - ec2:DescribeNetworkInterfaces
              - ec2:DescribeTags
              - ec2:GetCoipPoolUsage
              - ec2:DescribeCoipPools
              - ec2:GetSecurityGroupsForVpc
              - ec2:DescribeIpamPools
              - ec2:DescribeRouteTables
              - elasticloadbalancing:DescribeLoadBalancers
              - elasticloadbalancing:DescribeLoadBalancerAttributes
              - elasticloadbalancing:DescribeListeners
              - elasticloadbalancing:DescribeListenerCertificates
              - elasticloadbalancing:DescribeSSLPolicies
              - elasticloadbalancing:DescribeRules
              - elasticloadbalancing:DescribeTargetGroups
              - elasticloadbalancing:DescribeTargetGroupAttributes
              - elasticloadbalancing:DescribeTargetHealth
              - elasticloadbalancing:DescribeTags
              - elasticloadbalancing:DescribeTrustStores
              - elasticloadbalancing:DescribeListenerAttributes
              - elasticloadbalancing:DescribeCapacityReservation
            Resource: "*"
          - Effect: Allow
            Action:
              - cognito-idp:DescribeUserPoolClient
              - acm:ListCertificates
              - acm:DescribeCertificate
              - iam:ListServerCertificates
              - iam:GetServerCertificate
              - waf-regional:GetWebACL
              - waf-regional:GetWebACLForResource
              - waf-regional:AssociateWebACL
              - waf-regional:DisassociateWebACL
              - wafv2:GetWebACL
              - wafv2:GetWebACLForResource
              - wafv2:AssociateWebACL
              - wafv2:DisassociateWebACL
              - shield:GetSubscriptionState
              - shield:DescribeProtection
              - shield:CreateProtection
              - shield:DeleteProtection
            Resource: "*"
          - Effect: Allow
            Action:
              - ec2:AuthorizeSecurityGroupIngress
              - ec2:RevokeSecurityGroupIngress
            Resource: "*"
          - Effect: Allow
            Action: ec2:CreateSecurityGroup
            Resource: "*"
          - Effect: Allow
            Action: ec2:CreateTags
            Resource: !Sub arn:${AWS::Partition}:ec2:*:*:security-group/*
            Condition:
              StringEquals:
                ec2:CreateAction: CreateSecurityGroup
              "Null":
                aws:RequestTag/elbv2.k8s.aws/cluster: "false"
          - Effect: Allow
            Action:
              - ec2:CreateTags
              - ec2:DeleteTags
            Resource: !Sub arn:${AWS::Partition}:ec2:*:*:security-group/*
            Condition:
              "Null":
                aws:RequestTag/elbv2.k8s.aws/cluster: "true"
                aws:ResourceTag/elbv2.k8s.aws/cluster: "false"
          - Effect: Allow
            Action:
              - ec2:AuthorizeSecurityGroupIngress
              - ec2:RevokeSecurityGroupIngress
              - ec2:DeleteSecurityGroup
            Resource: "*"
            Condition:
              "Null":
                aws:ResourceTag/elbv2.k8s.aws/cluster: "false"
          - Effect: Allow
            Action:
              - elasticloadbalancing:CreateLoadBalancer
              - elasticloadbalancing:CreateTargetGroup
            Resource: "*"
            Condition:
              "Null":
                aws:RequestTag/elbv2.k8s.aws/cluster: "false"
          - Effect: Allow
            Action:
              - elasticloadbalancing:CreateListener
              - elasticloadbalancing:DeleteListener
              - elasticloadbalancing:CreateRule
              - elasticloadbalancing:DeleteRule
            Resource: "*"
          - Effect: Allow
            Action:
              - elasticloadbalancing:AddTags
              - elasticloadbalancing:RemoveTags
            Resource:
              - !Sub arn:${AWS::Partition}:elasticloadbalancing:*:*:targetgroup/*/*
              - !Sub arn:${AWS::Partition}:elasticloadbalancing:*:*:loadbalancer/net/*/*
              - !Sub arn:${AWS::Partition}:elasticloadbalancing:*:*:loadbalancer/app/*/*
            Condition:
              "Null":
                aws:RequestTag/elbv2.k8s.aws/cluster: "true"
                aws:ResourceTag/elbv2.k8s.aws/cluster: "false"
          - Effect: Allow
            Action:
              - elasticloadbalancing:AddTags
              - elasticloadbalancing:RemoveTags
            Resource:
              - !Sub arn:${AWS::Partition}:elasticloadbalancing:*:*:listener/net/*/*/*
              - !Sub arn:${AWS::Partition}:elasticloadbalancing:*:*:listener/app/*/*/*
              - !Sub arn:${AWS::Partition}:elasticloadbalancing:*:*:listener-rule/net/*/*/*
              - !Sub arn:${AWS::Partition}:elasticloadbalancing:*:*:listener-rule/app/*/*/*
          - Effect: Allow
            Action:
              - elasticloadbalancing:ModifyLoadBalancerAttributes
              - elasticloadbalancing:SetIpAddressType
              - elasticloadbalancing:SetSecurityGroups
              - elasticloadbalancing:SetSubnets
              - elasticloadbalancing:DeleteLoadBalancer
              - elasticloadbalancing:ModifyTargetGroup
              - elasticloadbalancing:ModifyTargetGroupAttributes
              - elasticloadbalancing:DeleteTargetGroup
              - elasticloadbalancing:ModifyListenerAttributes
              - elasticloadbalancing:ModifyCapacityReservation
              - elasticloadbalancing:ModifyIpPools
            Resource: "*"
            Condition:
              "Null":
                aws:ResourceTag/elbv2.k8s.aws/cluster: "false"
          - Effect: Allow
            Action: elasticloadbalancing:AddTags
            Resource:
              - !Sub arn:${AWS::Partition}:elasticloadbalancing:*:*:targetgroup/*/*
              - !Sub arn:${AWS::Partition}:elasticloadbalancing:*:*:loadbalancer/net/*/*
              - !Sub arn:${AWS::Partition}:elasticloadbalancing:*:*:loadbalancer/app/*/*
            Condition:
              StringEquals:
                elasticloadbalancing:CreateAction:
                  - CreateTargetGroup
                  - CreateLoadBalancer
              "Null":
                aws:RequestTag/elbv2.k8s.aws/cluster: "false"
          - Effect: Allow
            Action:
              - elasticloadbalancing:RegisterTargets
              - elasticloadbalancing:DeregisterTargets
            Resource: !Sub arn:${AWS::Partition}:elasticloadbalancing:*:*:targetgroup/*/*
          - Effect: Allow
            Action:
              - elasticloadbalancing:SetWebAcl
              - elasticloadbalancing:ModifyListener
              - elasticloadbalancing:AddListenerCertificates
              - elasticloadbalancing:RemoveListenerCertificates
              - elasticloadbalancing:ModifyRule
              - elasticloadbalancing:SetRulePriorities
            Resource: "*"

Outputs:
  VpcId:
    Value: !Ref Vpc
  ClusterSecurityGroupId:
    Value: !Ref ClusterSecurityGroup
  NodeSecurityGroupId:
    Value: !Ref NodeSecurityGroup
  PublicSubnetIds:
    Value: !Join [",", [!Ref PublicSubnetA, !Ref PublicSubnetB]]
  ClusterName:
    Value: !Ref EksCluster
  ClusterArn:
    Value: !GetAtt EksCluster.Arn
  RepositoryName:
    Value: !Ref ImageRepository
  RepositoryUri:
    Value: !GetAtt ImageRepository.RepositoryUri
  EcrRepoUri:
    Value: !GetAtt ImageRepository.RepositoryUri
  ReportBucketName:
    Value: !Ref ReportBucket
  BucketName:
    Value: !Ref ReportBucket
  ReportPrefix:
    Value: !Ref ReportPrefix
  DatabaseEndpoint:
    Value: !GetAtt Database.Endpoint.Address
  DBEndpoint:
    Value: !GetAtt Database.Endpoint.Address
  DatabasePort:
    Value: !GetAtt Database.Endpoint.Port
  DatabaseName:
    Value: !Ref DatabaseName
  DatabaseSecretArn:
    Value: !GetAtt Database.MasterUserSecret.SecretArn
  DBSecretArn:
    Value: !GetAtt Database.MasterUserSecret.SecretArn
  AppPodRoleArn:
    Value: !GetAtt AppPodRole.Arn
  LoadBalancerControllerPodRoleArn:
    Value: !GetAtt LoadBalancerControllerPodRole.Arn
  BedrockRegion:
    Value: !Ref BedrockRegion
  BedrockModelId:
    Value: !Ref BedrockModelId
